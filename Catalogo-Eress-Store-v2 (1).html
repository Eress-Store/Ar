<!DOCTYPE html><html lang="es"><head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eress Store — Catálogo 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&amp;family=Bebas+Neue&amp;family=DM+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="catalog-data-v2.js"></script>
<style>
/* ══ DESIGN TOKENS ══
   Análisis del logo Eress:
   - Negro profundo + oro champagne + destellos blancos
   - Tipografía serif elegante con brillo cálido
   → Paleta: crema cálida como base, negro suave, champagne/dorado discreto
   → Menos contraste extremo, más respiración, menos "ruido"
*/
:root {
  --cream:    #FAF7F2;       /* fondo base — crema muy cálida */
  --cream2:   #F3EFE8;       /* fondo secundario */
  --cream3:   #EDE8DF;       /* bordes suaves */
  --ink:      #1A1712;       /* negro cálido, no frío */
  --ink2:     #3D3830;       /* texto secundario */
  --ink3:     #7A736A;       /* texto terciario */
  --champ:    #B8965A;       /* champagne/dorado — el acento del logo */
  --champ2:   #D4B07A;       /* champagne claro */
  --champ3:   #ECD9B5;       /* champagne pálido */
  --wa:       #25D366;
  --wa-dark:  #128C7E;
  --ig:       #E1306C;
  --ig-dark:  #C13584;
  --fb:       #1877F2;
  --fb-dark:  #0C5FD4;
  --radius:   3px;
  --shadow:   0 2px 16px rgba(26,23,18,0.08);
  --shadow-hover: 0 8px 32px rgba(26,23,18,0.14);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--cream2);}
::-webkit-scrollbar-thumb{background:var(--champ3);border-radius:2px;}

/* ══ HEADER ══ */
.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(250,247,242,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--cream3);
  padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  height:58px;gap:12px;
}
.header-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;}
.brand-ring{
  width:36px;height:36px;
  border:1px solid var(--champ);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.brand-ring::before{
  content:'✦';position:absolute;top:-7px;left:50%;transform:translateX(-50%);
  color:var(--champ);font-size:8px;background:var(--cream);padding:0 2px;
}
.brand-wordmark{line-height:1;}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:6px;color:var(--ink);}
.brand-sub{font-size:8px;letter-spacing:4px;color:var(--ink3);font-weight:500;text-transform:uppercase;}

.header-search{
  flex:1;max-width:380px;
  display:flex;align-items:center;gap:8px;
  background:var(--cream2);border:1px solid var(--cream3);
  border-radius:var(--radius);padding:0 12px;height:36px;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.header-search:focus-within{border-color:var(--champ2);box-shadow:0 0 0 3px rgba(184,150,90,0.1);}
.header-search input{
  background:none;border:none;outline:none;
  color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;
}
.header-search input::placeholder{color:var(--ink3);}
.search-ico{color:var(--ink3);font-size:14px;flex-shrink:0;}

.header-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.btn-action{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 12px;border:none;border-radius:var(--radius);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:0.3px;transition:all 0.18s;white-space:nowrap;flex-shrink:0;
}
.btn-pdf{background:var(--ink);color:var(--cream);}
.btn-pdf:hover{background:var(--ink2);}
.btn-ig{
  background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  color:#fff;
}
.btn-ig:hover{opacity:0.88;}
.btn-fb{background:var(--fb);color:#fff;}
.btn-fb:hover{background:var(--fb-dark);}
.btn-icon{font-size:15px;line-height:1;}
.header-count{
  font-family:'Bebas Neue',sans-serif;font-size:12px;
  color:var(--ink3);letter-spacing:1px;
  padding:5px 10px;background:var(--cream2);
  border:1px solid var(--cream3);border-radius:var(--radius);
}

/* ══ LAYOUT ══ */
.main-layout{display:grid;grid-template-columns:220px 1fr;flex:1;min-height:0;}

/* ══ SIDEBAR ══ */
.sidebar{
  background:var(--cream2);
  border-right:1px solid var(--cream3);
  padding:20px 0;
  position:sticky;top:60px;
  height:calc(100vh - 60px);
  overflow-y:auto;
}
.sb-section{margin-bottom:8px;}
.sb-label{
  font-size:9px;letter-spacing:3px;color:var(--ink3);
  padding:8px 18px 5px;text-transform:uppercase;font-weight:700;
}
.sb-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:8px 18px;
  background:none;border:none;cursor:pointer;
  color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  text-align:left;transition:background 0.12s,color 0.12s;
  border-left:2px solid transparent;
}
.sb-btn:hover{background:var(--cream3);color:var(--ink);}
.sb-btn.active{color:var(--champ);background:rgba(184,150,90,0.08);border-left-color:var(--champ);}
.sb-count{
  font-size:10px;color:var(--ink3);background:var(--cream);
  padding:1px 6px;border-radius:10px;border:1px solid var(--cream3);
}
.sb-btn.active .sb-count{color:var(--champ);background:rgba(184,150,90,0.12);}
.sb-divider{height:1px;background:var(--cream3);margin:10px 14px;}
.sb-gender{display:flex;gap:5px;padding:4px 14px 8px;flex-wrap:wrap;}
.gf{
  padding:4px 9px;border:1px solid var(--cream3);background:none;
  color:var(--ink3);cursor:pointer;font-size:10px;letter-spacing:0.5px;
  font-family:'DM Sans',sans-serif;font-weight:600;border-radius:var(--radius);
  transition:all 0.12s;
}
.gf:hover{border-color:var(--champ2);color:var(--ink);}
.gf.active{background:var(--champ);border-color:var(--champ);color:#fff;}

/* ══ CONTENT ══ */
.catalog-content{padding:24px 28px;min-width:0;}
.section-row{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ink);letter-spacing:3px;}
.section-badge{
  font-size:10px;color:var(--ink3);border:1px solid var(--cream3);
  padding:2px 8px;border-radius:10px;font-weight:500;
}
.section-line{flex:1;height:1px;background:var(--cream3);}

/* Sort bar */
.sort-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;gap:12px;
}
.sort-left{display:flex;gap:6px;align-items:center;}
.sort-lbl{font-size:10px;color:var(--ink3);letter-spacing:1px;font-weight:600;}
.sort-btn{
  padding:5px 10px;border:1px solid var(--cream3);background:none;
  color:var(--ink3);font-size:11px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;border-radius:var(--radius);transition:all 0.12s;
}
.sort-btn:hover{border-color:var(--champ2);color:var(--ink);}
.sort-btn.active{border-color:var(--champ);color:var(--champ);background:rgba(184,150,90,0.08);}
.view-toggle{display:flex;gap:3px;}
.view-btn{
  width:30px;height:30px;border:1px solid var(--cream3);background:none;
  color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;border-radius:var(--radius);transition:all 0.12s;
}
.view-btn:hover{border-color:var(--champ2);color:var(--ink);}
.view-btn.active{border-color:var(--champ);color:var(--champ);background:rgba(184,150,90,0.08);}

/* ══ PRODUCT GRID ══ */
.product-grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-list{grid-template-columns:1fr;}

/* ══ PRODUCT CARD ══ */
.prod-card{
  background:#fff;
  border:1px solid var(--cream3);
  border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;
  position:relative;cursor:pointer;
  transition:border-color 0.2s,transform 0.18s,box-shadow 0.2s;
}
.prod-card:hover{
  border-color:var(--champ2);
  transform:translateY(-2px);
  box-shadow:var(--shadow-hover);
}

/* Image area */
.card-img-area{
  height:180px;position:relative;
  background:linear-gradient(160deg,var(--cream) 0%,var(--cream2) 100%);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.card-img-area img{
  height:155px;width:auto;max-width:140px;
  object-fit:contain;position:relative;z-index:1;
  transition:transform 0.3s ease;
  filter:drop-shadow(0 4px 12px rgba(26,23,18,0.12));
}
.prod-card:hover .card-img-area img{transform:scale(1.05);}

/* Gender badge */
.card-badge{
  position:absolute;top:10px;right:10px;z-index:5;
  font-size:8px;letter-spacing:1px;font-weight:700;
  padding:3px 7px;border-radius:2px;
  font-family:'DM Sans',sans-serif;
}

/* Card body */
.card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:5px;}
.card-meta{display:flex;align-items:center;justify-content:space-between;}
.card-num{font-size:9px;color:var(--ink3);font-weight:500;letter-spacing:0.5px;}
.card-subcat{
  font-size:8px;letter-spacing:0.5px;font-weight:700;
  color:var(--champ);border:1px solid var(--champ3);
  padding:1px 6px;border-radius:2px;background:rgba(184,150,90,0.06);
}
.card-marca{font-size:9px;letter-spacing:2px;color:var(--ink3);font-weight:700;text-transform:uppercase;}
.card-nombre{
  font-family:'Playfair Display',serif;font-size:13px;font-weight:700;
  color:var(--ink);line-height:1.35;
}
.card-notas{font-size:11px;color:var(--ink3);line-height:1.5;flex:1;font-weight:300;}
.card-divider{height:1px;background:var(--cream3);margin:2px 0;}

/* Price row */
.card-price-row{display:flex;align-items:center;gap:8px;}
.price-lbl{font-size:9px;color:var(--ink3);letter-spacing:1px;font-weight:700;flex-shrink:0;}
.price-curr{
  font-family:'Bebas Neue',sans-serif;font-size:16px;
  color:var(--champ);flex-shrink:0;letter-spacing:1px;
}
.price-input{
  flex:1;background:none;border:none;border-bottom:1px solid var(--champ3);
  color:var(--ink);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;
  outline:none;padding-bottom:1px;min-width:0;transition:border-color 0.2s;
}
.price-input:focus{border-color:var(--champ);}
.price-input::placeholder{color:var(--cream3);font-size:13px;font-family:'DM Sans',sans-serif;}

/* WhatsApp button */
.card-wa{
  display:flex;align-items:center;justify-content:center;gap:5px;
  margin-top:6px;padding:7px 0;
  background:var(--wa);color:#fff;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:0.5px;border-radius:var(--radius);
  transition:background 0.15s,transform 0.1s;
}
.card-wa:hover{background:var(--wa-dark);transform:scale(1.01);}
.card-wa:active{transform:scale(0.99);}

/* ── LIST CARD ── */
.prod-card.list-card{flex-direction:row;height:88px;}
.list-card .card-img-area{width:88px;height:88px;flex-shrink:0;}
.list-card .card-img-area img{height:72px;max-width:68px;}
.list-card .card-body{flex-direction:row;align-items:center;gap:14px;padding:0 16px;}
.list-card .card-main{flex:1;min-width:0;}
.list-card .card-notas,.list-card .card-divider,.list-card .card-subcat,.list-card .card-wa-wrap{display:none;}
.list-card .card-price-row{width:160px;flex-shrink:0;}

/* ══ MODAL ══ */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(26,23,18,0.6);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  animation:fadeIn 0.18s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-card{
  background:#fff;border:1px solid var(--cream3);
  max-width:680px;width:100%;border-radius:4px;
  position:relative;overflow:hidden;
  box-shadow:0 24px 64px rgba(26,23,18,0.2);
  animation:slideUp 0.22s ease;
}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-grid{display:grid;grid-template-columns:240px 1fr;}
.modal-img-col{
  background:linear-gradient(160deg,var(--cream) 0%,var(--cream2) 100%);
  display:flex;align-items:center;justify-content:center;
  padding:28px;min-height:320px;
}
.modal-img-col img{
  max-height:240px;max-width:200px;object-fit:contain;
  filter:drop-shadow(0 8px 20px rgba(26,23,18,0.15));
}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:10px;}
.modal-close{
  position:absolute;top:14px;right:14px;
  background:none;border:1px solid var(--cream3);color:var(--ink3);
  width:30px;height:30px;cursor:pointer;font-size:14px;z-index:10;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius);transition:all 0.15s;
}
.modal-close:hover{border-color:var(--ink);color:var(--ink);}
.modal-marca{font-size:9px;letter-spacing:3px;color:var(--ink3);font-weight:700;}
.modal-nombre{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--ink);line-height:1.2;}
.modal-cats{display:flex;gap:6px;flex-wrap:wrap;}
.modal-cat-pill{
  font-size:9px;letter-spacing:1px;border:1px solid var(--cream3);
  padding:2px 8px;border-radius:2px;color:var(--ink3);font-weight:600;background:var(--cream2);
}
.modal-divider{height:1px;background:var(--cream3);}
.modal-desc{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--ink2);line-height:1.6;}
.modal-notas-lbl{font-size:9px;letter-spacing:2px;color:var(--ink3);text-transform:uppercase;font-weight:700;}
.modal-notas-val{font-family:'Playfair Display',serif;font-size:14px;color:var(--champ);font-style:italic;}
.modal-price-row{
  margin-top:auto;display:flex;align-items:center;gap:8px;
  padding-top:12px;border-top:1px solid var(--cream3);
}
.modal-price-lbl{font-size:9px;letter-spacing:2px;color:var(--ink3);flex-shrink:0;font-weight:700;}
.modal-price-curr{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--champ);flex-shrink:0;}
.modal-price-input{
  flex:1;background:none;border:none;border-bottom:1px solid var(--champ3);
  color:var(--ink);font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;
  outline:none;padding-bottom:2px;min-width:0;transition:border-color 0.2s;
}
.modal-price-input:focus{border-color:var(--champ);}
.modal-price-input::placeholder{color:var(--cream3);font-family:'DM Sans',sans-serif;font-size:14px;}
.modal-wa-btn{
  display:flex;align-items:center;gap:7px;
  padding:10px 18px;background:var(--wa);color:#fff;
  border:none;cursor:pointer;border-radius:var(--radius);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;
  transition:background 0.15s;flex-shrink:0;white-space:nowrap;
}
.modal-wa-btn:hover{background:var(--wa-dark);}

/* ══ EMPTY STATE ══ */
.empty-state{padding:60px 20px;text-align:center;}
.empty-icon{font-size:36px;color:var(--cream3);margin-bottom:12px;}
.empty-text{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--ink3);}

/* ══ FOOTER ══ */
.site-footer{
  border-top:1px solid var(--cream3);padding:18px 28px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--cream2);
}
.footer-brand{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--ink3);letter-spacing:4px;}
.footer-social{font-size:11px;color:var(--ink3);letter-spacing:0.5px;}

/* ══ PDF PRINT STYLES ══ */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .site-header, .sidebar, .sort-bar, .view-toggle, .header-actions,
  .modal-overlay, .card-wa, .card-wa-wrap { display: none !important; }
  body { background: #fff; }
  .main-layout { grid-template-columns: 1fr !important; }
  .catalog-content { padding: 0 !important; }
  .product-grid { grid-template-columns: repeat(3,1fr) !important; gap: 8px !important; }
  .prod-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ddd !important; }
  .card-img-area { height: 140px !important; }
  .card-img-area img { height: 120px !important; }
  .print-header {
    display: flex !important;
    align-items: center; justify-content: space-between;
    padding: 16px 0 12px; border-bottom: 2px solid #B8965A;
    margin-bottom: 16px;
  }
  .print-header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 8px; color: #1A1712;
  }
  .print-header-sub { font-size: 11px; color: #7A736A; letter-spacing: 2px; margin-top: 2px; }
  .section-row { margin-top: 12px !important; }
}

/* ══ MOBILE NAV BAR ══ */
.mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:rgba(250,247,242,0.97);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--cream3);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
}
.mobile-nav-inner{
  display:flex;justify-content:space-around;align-items:center;
}
.mnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  color:var(--ink3);font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:600;letter-spacing:0.3px;
  padding:4px 8px;border-radius:var(--radius);transition:color 0.15s;
  min-width:52px;
}
.mnav-btn.active{color:var(--champ);}
.mnav-btn svg,.mnav-btn .mnav-ico{font-size:20px;}
.mnav-sep{width:1px;height:32px;background:var(--cream3);}

/* ══ MOBILE SEARCH BAR ══ */
.mobile-search-bar{
  display:none;
  padding:10px 14px;
  background:var(--cream);
  border-bottom:1px solid var(--cream3);
  position:sticky;top:58px;z-index:99;
}
.mobile-search-bar .header-search{
  max-width:100%;width:100%;
}

/* ══ MOBILE FILTER CHIPS ══ */
.mobile-cats{
  display:none;
  padding:10px 14px;
  background:var(--cream);
  border-bottom:1px solid var(--cream3);
  overflow-x:auto;
  position:sticky;top:calc(58px + 56px);z-index:98;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.mobile-cats::-webkit-scrollbar{display:none;}
.mobile-cats-inner{display:flex;gap:8px;width:max-content;padding-right:14px;}
.mcat-chip{
  padding:7px 14px;border:1px solid var(--cream3);background:#fff;
  border-radius:20px;font-size:12px;font-weight:600;
  color:var(--ink3);cursor:pointer;white-space:nowrap;
  font-family:'DM Sans',sans-serif;transition:all 0.15s;
}
.mcat-chip.active{background:var(--champ);border-color:var(--champ);color:#fff;}

/* ══ RESPONSIVE ══ */

<script type="text/babel">
const { useState, useCallback } = React;

// useTweaks stub — reemplaza el plugin del editor online
function useTweaks(defaults) {
  const [state, setState] = useState(defaults);
  const set = (key, val) => setState(prev => ({ ...prev, [key]: val }));
  return [state, set];
}

// ── CONSTANTS ──
const STORAGE_KEY = 'eress_prices_v3';
const WA_NUMBER  = '5493704344885'; // ← REEMPLAZAR con número real
const IG_URL     = 'https://instagram.com/eress_store'; // ← REEMPLAZAR
const FB_URL     = 'https://www.facebook.com/agos.gonzalez.96995?locale=es_LA';   // ← REEMPLAZAR

const GENDER_LABELS = { F:'♀ Fem', M:'♂ Masc', U:'⚥ Unisex', I:'★ Niños' };
const GENDER_COLORS = {
  F: { bg:'#FDF0F2', text:'#B5697A', border:'#F2BFCA' },
  M: { bg:'#EFF5FB', text:'#5882A6', border:'#B8D0E8' },
  U: { bg:'#F3F0F8', text:'#7B68A8', border:'#C8BDE0' },
  I: { bg:'#EDFAF3', text:'#4A9B6F', border:'#A8DFC0' },
};
const DEFAULT_COLOR = { bg:'#F8F4EE', text:'#B8965A', border:'#DDD0B8' };

const CAT_MENU = [
  { key:'all',     label:'Todo el catálogo',   icon:'◈' },
  { key:'Árabe',   label:'Perfumes Árabes',    icon:'✦' },
  { key:'Premium', label:'Perfumes Premium',   icon:'◆' },
  { key:'Kit',     label:'Kits & Colecciones', icon:'◎' },
  { key:'Infantil',label:'Infantiles',          icon:'★' },
];
// Cat filter helper — kits live inside Árabe/Infantil with subcat 'Kit', so we surface them
function matchCat(p, key) {
  if (key === 'all') return true;
  if (key === 'Kit') return p.subcat === 'Kit' || p.subcat === 'Ultra Premium' || p.subcat === 'Decant';
  if (key === 'Infantil') return p.cat === 'Infantil';
  if (key === 'Árabe') return p.cat === 'Árabe' && p.subcat !== 'Kit' && p.subcat !== 'Ultra Premium' && p.subcat !== 'Decant' && p.cat !== 'Infantil';
  if (key === 'Premium') return p.cat === 'Premium';
  return p.cat === key;
}
const SORT_OPTIONS = [
  { key:'num',   label:'N° Prod.' },
  { key:'alfa',  label:'A–Z' },
  { key:'marca', label:'Marca' },
  { key:'precio',label:'Precio' },
];

function loadPrices() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function savePrices(p) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch{} }
function fmt(v) {
  if (!v && v !== 0) return '';
  return v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}
function parseNum(s) { return s.replace(/\./g,'').replace(/[^0-9]/g,''); }

function buildWAMessage(prod, price, waNum) {
  const priceText = price ? `$${fmt(price)}` : 'a consultar';
  const msg = `Hola! Vi el catálogo de *Eress Store* y me interesa:\n\n🌸 *${prod.nombre}*\n📦 Marca: ${prod.marca}\n🏷️ Precio: ${priceText}\n\n¿Está disponible?`;
  return `https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`;
}

// ── MAIN APP ──
function App() {
  const products = window.ERESS_PRODUCTS || [];
  const [prices, setPricesState] = useState(loadPrices);
  const [activeCat, setActiveCat] = useState('all');
  const [genderFilter, setGenderFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('num');
  const [viewMode, setViewMode] = useState('grid4');
  const [modal, setModal] = useState(null);
  const [waNum, setWaNum] = useState(WA_NUMBER);
  const [igUrl, setIgUrl] = useState(IG_URL);
  const [fbUrl, setFbUrl] = useState(FB_URL);

  const setPrices = useCallback((upd) => {
    setPricesState(prev => {
      const next = typeof upd === 'function' ? upd(prev) : upd;
      savePrices(next);
      return next;
    });
  }, []);

  const handlePriceChange = useCallback((id, val) => {
    setPrices(prev => ({ ...prev, [id]: val }));
  }, [setPrices]);

  const filtered = products.filter(p => {
    if (!matchCat(p, activeCat)) return false;
    if (genderFilter !== 'all' && p.genero !== genderFilter) return false;
    if (search) {
      const q = search.toLowerCase();
      return p.nombre.toLowerCase().includes(q) ||
             p.marca.toLowerCase().includes(q) ||
             p.notas.toLowerCase().includes(q) ||
             (p.subcat||'').toLowerCase().includes(q);
    }
    return true;
  });

  const sorted = [...filtered].sort((a,b) => {
    if (sortKey==='alfa') return a.nombre.localeCompare(b.nombre);
    if (sortKey==='marca') return a.marca.localeCompare(b.marca);
    if (sortKey==='precio') {
      const pa=parseInt(prices[a.id]||'0')||0, pb=parseInt(prices[b.id]||'0')||0;
      return pb-pa;
    }
    return a.id-b.id;
  });

  const countFor = (cat) => products.filter(p=>matchCat(p,cat)).length;
  const catName = CAT_MENU.find(c=>c.key===activeCat)?.label || 'Catálogo';
  const gridClass = {grid4:'product-grid grid-4',grid3:'product-grid grid-3',grid2:'product-grid grid-2',list:'product-grid grid-list'}[viewMode]||'product-grid grid-4';
  const totalWithPrice = products.filter(p=>prices[p.id]&&prices[p.id]!=='').length;

  const handlePrint = () => window.print();

  return (
    <>
      {/* Print header (only visible in print) */}
      <div className="print-header" style={{display:'none'}}>
        <div>
          <div className="print-header-title">ERESS STORE</div>
          <div className="print-header-sub">CATÁLOGO OFICIAL DE PERFUMES · ARGENTINA 2026</div>
        </div>
        <div style={{textAlign:'right',fontSize:11,color:'#7A736A'}}>
          <div>📱 WhatsApp · 📸 Instagram · 👍 Facebook</div>
          <div style={{marginTop:4,color:'#B8965A',fontWeight:700}}>{products.length} productos disponibles</div>
        </div>
      </div>

      <header className="site-header">
        <div className="header-brand" onClick={()=>{setActiveCat('all');setSearch('');}}>
          <div className="brand-ring">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2L9.2 6H13L9.9 8.4L11.1 12.5L8 10.1L4.9 12.5L6.1 8.4L3 6H6.8Z"
                fill="none" stroke="#B8965A" strokeWidth="0.8" opacity="0.8"/>
            </svg>
          </div>
          <div className="brand-wordmark">
            <div className="brand-name">ERESS</div>
            <div className="brand-sub">STORE</div>
          </div>
        </div>

        {/* search — oculto en mobile, visible en desktop */}
        <div className="header-search" style={{flex:1,maxWidth:360}}>
          <span className="search-ico">⌕</span>
          <input type="text" placeholder="Buscar perfume, marca o notas..."
            value={search} onChange={e=>setSearch(e.target.value)} />
          {search && <button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:'var(--ink3)',cursor:'pointer',fontSize:12}}>✕</button>}
        </div>

        <div className="header-actions">
          <div className="header-count">{totalWithPrice}/{products.length} con precio</div>
          <button className="btn-action btn-ig" onClick={()=>window.open(igUrl,'_blank')} title="Instagram">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/>
              <circle cx="17.5" cy="6.5" r="1.2" fill="white" stroke="none"/>
            </svg>
            <span className="btn-lbl">Instagram</span>
          </button>
          <button className="btn-action btn-fb" onClick={()=>window.open(fbUrl,'_blank')} title="Facebook">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            <span className="btn-lbl">Facebook</span>
          </button>
          <button className="btn-action btn-pdf" onClick={handlePrint}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 9V2h12v7"/><rect x="6" y="14" width="12" height="8"/>
              <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
            </svg>
            <span className="btn-lbl">PDF</span>
          </button>
        </div>
      </header>

      {/* ── MOBILE SEARCH BAR ── */}
      <div className="mobile-search-bar">
        <div className="header-search" style={{maxWidth:'100%',width:'100%'}}>
          <span className="search-ico">⌕</span>
          <input type="text" placeholder="Buscar perfume, marca..."
            value={search} onChange={e=>setSearch(e.target.value)} />
          {search && <button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:'var(--ink3)',cursor:'pointer',fontSize:12}}>✕</button>}
        </div>
      </div>

      {/* ── MOBILE CATEGORY CHIPS ── */}
      <div className="mobile-cats">
        <div className="mobile-cats-inner">
          {CAT_MENU.map(c=>(
            <button key={c.key}
              className={`mcat-chip ${activeCat===c.key?'active':''}`}
              onClick={()=>{setActiveCat(c.key);setGenderFilter('all');}}>
              {c.icon} {c.label}
            </button>
          ))}
          {['F','M','U','I'].map(g=>(
            <button key={g}
              className={`mcat-chip ${genderFilter===g?'active':''}`}
              onClick={()=>setGenderFilter(genderFilter===g?'all':g)}>
              {GENDER_LABELS[g]}
            </button>
          ))}
        </div>
      </div>

      <div className="main-layout">
        <aside className="sidebar">
          <div className="sb-section">
            <div className="sb-label">Categorías</div>
            {CAT_MENU.map(c => (
              <button key={c.key}
                className={`sb-btn ${activeCat===c.key?'active':''}`}
                onClick={()=>{setActiveCat(c.key);setGenderFilter('all');}}>
                <span>{c.icon} {c.label}</span>
                <span className="sb-count">{countFor(c.key)}</span>
              </button>
            ))}
          </div>

          <div className="sb-divider"></div>

          <div className="sb-section">
            <div className="sb-label">Género</div>
            <div className="sb-gender">
              {['all','F','M','U','I'].map(g => (
                <button key={g} className={`gf ${genderFilter===g?'active':''}`}
                  onClick={()=>setGenderFilter(g)}>
                  {g==='all'?'TODOS':GENDER_LABELS[g]}
                </button>
              ))}
            </div>
          </div>

          <div className="sb-divider"></div>

          <div className="sb-section">
            <div className="sb-label">Marcas</div>
            {['LATTAFA','ARMAF','AFNAN','AL HARAMAIN','MAISON ALHAMBRA','RASASI','CAROLINA HERRERA','CHRISTIAN DIOR','PACO RABANNE','VERSACE','GIORGIO ARMANI','JEAN PAUL GAULTIER','GIVENCHY','VALENTINO','MOSCHINO','JIMMY CHOO','DOLCE & GABBANA','AZZARO','XERJOFF','YSL','BHARARA','KENZO','LANCÔME'].map(m => {
              const cnt = products.filter(p=>p.marca===m).length;
              return cnt>0 ? (
                <button key={m} className={`sb-btn ${search===m?'active':''}`}
                  onClick={()=>{setSearch(m);setActiveCat('all');}}>
                  <span style={{fontSize:12}}>{m}</span>
                  <span className="sb-count">{cnt}</span>
                </button>
              ) : null;
            })}
          </div>
        </aside>

        <main className="catalog-content">
          <div className="section-row">
            <div className="section-title">{catName}</div>
            <div className="section-badge">{sorted.length} productos</div>
            <div className="section-line"></div>
          </div>

          <div className="sort-bar">
            <div className="sort-left">
              <span className="sort-lbl">ORDENAR:</span>
              {SORT_OPTIONS.map(s => (
                <button key={s.key} className={`sort-btn ${sortKey===s.key?'active':''}`}
                  onClick={()=>setSortKey(s.key)}>{s.label}</button>
              ))}
            </div>
            <div className="view-toggle">
              <button className={`view-btn ${viewMode==='grid4'?'active':''}`} onClick={()=>setViewMode('grid4')} title="4 col">⊞</button>
              <button className={`view-btn ${viewMode==='grid3'?'active':''}`} onClick={()=>setViewMode('grid3')} title="3 col">▦</button>
              <button className={`view-btn ${viewMode==='grid2'?'active':''}`} onClick={()=>setViewMode('grid2')} title="2 col">▥</button>
              <button className={`view-btn ${viewMode==='list'?'active':''}`} onClick={()=>setViewMode('list')} title="Lista">≡</button>
            </div>
          </div>

          {sorted.length === 0
            ? <div className="empty-state">
                <div className="empty-icon">◈</div>
                <div className="empty-text">No se encontraron productos para esta búsqueda.</div>
              </div>
            : <div className={gridClass}>
                {sorted.map(p => (
                  <ProdCard key={p.id} prod={p} price={prices[p.id]||''}
                    onPriceChange={handlePriceChange} onClick={()=>setModal(p)}
                    listView={viewMode==='list'} waNum={waNum} />
                ))}
              </div>
          }
        </main>
      </div>

      <footer className="site-footer">
        <div className="footer-brand">ERESS STORE · ARGENTINA 2026</div>
        <div className="footer-social">📱 WhatsApp &nbsp;·&nbsp; 📸 Instagram &nbsp;·&nbsp; 👍 Facebook</div>
      </footer>

      {modal && (
        <ProdModal prod={modal} price={prices[modal.id]||''}
          onPriceChange={handlePriceChange} onClose={()=>setModal(null)} waNum={waNum} />
      )}

      <TweaksWrapper onWaChange={setWaNum} waNum={waNum} onIgChange={setIgUrl} igUrl={igUrl} onFbChange={setFbUrl} fbUrl={fbUrl} />

      {/* ── MOBILE BOTTOM NAV ── */}
      <nav className="mobile-nav">
        <div className="mobile-nav-inner">
          <button className="mnav-btn" onClick={()=>window.open(igUrl,'_blank')}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/>
              <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
            </svg>
            Instagram
          </button>
          <div className="mnav-sep"></div>
          <button className="mnav-btn" onClick={()=>window.open(fbUrl,'_blank')}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Facebook
          </button>
          <div className="mnav-sep"></div>
          <button className="mnav-btn" style={{color:'var(--wa)'}} onClick={()=>window.open(`https://wa.me/${waNum}`,'_blank')}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </button>
          <div className="mnav-sep"></div>
          <button className="mnav-btn" onClick={handlePrint}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M6 9V2h12v7"/><rect x="6" y="14" width="12" height="8"/>
              <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
            </svg>
            PDF
          </button>
        </div>
      </nav>
    </>
  );
}

// ── TWEAKS ──
function TweaksWrapper({ onWaChange, waNum, onIgChange, igUrl, onFbChange, fbUrl }) {
  const { TweaksPanel, TweakSection, TweakText } = window;
  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "whatsapp": "5493704344885",
    "instagram": "https:\/\/instagram.com\/eress_store",
    "facebook": "https:\/\/facebook.com\/eresssar",
    "ctaText": "¡Consultá por WhatsApp!"
  }/*EDITMODE-END*/);

  if (!TweaksPanel) return null;

  return (
    <TweaksPanel title="Tweaks – Eress Store">
      <TweakSection label="WHATSAPP">
        <TweakText label="Número (con código país)" value={tweaks.whatsapp}
          onChange={v=>{ setTweak('whatsapp',v); onWaChange(v); }} />
        <TweakText label="Texto CTA" value={tweaks.ctaText}
          onChange={v=>setTweak('ctaText',v)} />
      </TweakSection>
      <TweakSection label="REDES SOCIALES">
        <TweakText label="URL Instagram" value={tweaks.instagram}
          onChange={v=>{ setTweak('instagram',v); onIgChange(v); }} />
        <TweakText label="URL Facebook" value={tweaks.facebook}
          onChange={v=>{ setTweak('facebook',v); onFbChange(v); }} />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
