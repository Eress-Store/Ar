name: Sincronizar imágenes de productos

# Cuándo se ejecuta:
# - Manualmente desde la pestaña Actions de GitHub
# - Automáticamente cuando cambia products.js
on:
  workflow_dispatch:
  push:
    paths:
      - 'products.js'

permissions:
  contents: write

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Descargar imágenes y regenerar products.js
        run: python scripts/sync_images.py

      - name: Commit de cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imgs/ products.js
          git diff --staged --quiet || git commit -m "🖼️ Sincronizar imágenes de productos [skip ci]"
          git push
